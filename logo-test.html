<!DOCTYPE html>
<html>
<head>
    <title>Official IPL Logos Test</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: Arial, sans-serif; 
            padding: 20px; 
        }
        .logo-test { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        .logo-item { 
            text-align: center; 
            background: #2a2a2a; 
            padding: 15px; 
            border-radius: 8px; 
        }
        .logo-item img { 
            width: 60px; 
            height: 60px; 
            object-fit: contain; 
            border-radius: 4px; 
            background: white; 
            padding: 5px; 
            margin-bottom: 8px; 
        }
        .logo-item .name { 
            font-size: 12px; 
            margin-bottom: 4px; 
        }
        .logo-item .status { 
            font-size: 10px; 
            color: #888; 
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <h1>Official IPL Team Logos Test</h1>
    <div class="logo-test" id="logoTest"></div>

    <script>
        const teams = [
            { name: "Gujarat Titans", url: "./public/logos/Original Gujarat Titans.webp" },
            { name: "Chennai Super Kings", url: "./public/logos/Original Chennai Super Kings.webp" },
            { name: "Mumbai Indians", url: "./public/logos/Original Mumbai Indians.webp" },
            { name: "Lucknow Super Giants", url: "./public/logos/Original Lucknow Super Giants.webp" },
            { name: "Royal Challengers Bangalore", url:"./public/logos/Original Royal Challengers Bangalore.webp" },
            { name: "Rajasthan Royals", url: "./public/logos/Original Rajasthan Royals.webp" },
            { name: "Punjab Kings", url: "./public/logos/Original Punjab Kings.webp" },
            { name: "Kolkata Knight Riders", url: "./public/logos/Original Kolkata Knight Riders.webp" },
            { name: "Delhi Capitals", url: "./public/logos/Original Delhi Capitals.webp" },
            { name: "Sunrisers Hyderabad", url: "./public/logos/sunrisers_hyderabad.webp" }
        ];

        const container = document.getElementById('logoTest');

        teams.forEach(team => {
            const div = document.createElement('div');
            div.className = 'logo-item';
            
            const img = document.createElement('img');
            img.src = team.url;
            img.alt = team.name;
            
            const name = document.createElement('div');
            name.className = 'name';
            name.textContent = team.name;
            
            const status = document.createElement('div');
            status.className = 'status';
            
            img.onload = () => {
                status.textContent = 'Loaded successfully';
                status.className = 'status success';
            };
            
            img.onerror = () => {
                status.textContent = 'Failed to load';
                status.className = 'status error';
            };
            
            div.appendChild(img);
            div.appendChild(name);
            div.appendChild(status);
            container.appendChild(div);
        });
    </script>
</body>
</html>
